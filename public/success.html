<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you | Stas & Marketa</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(120,119,198,0.25), transparent 40%),
          radial-gradient(circle at 80% 0%, rgba(255,120,200,0.16), transparent 40%),
          radial-gradient(circle at 50% 100%, rgba(212,175,55,0.10), transparent 35%),
          linear-gradient(180deg, #0b0f1a 0%, #0a0a0f 100%);
        color: white;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(92vw, 640px);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255,255,255,0.16);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3rem);
      }
      p {
        margin: 0 0 24px;
        line-height: 1.7;
        color: rgba(255,255,255,0.78);
      }
      a {
        display: inline-block;
        padding: 14px 20px;
        border-radius: 18px;
        text-decoration: none;
        background: linear-gradient(135deg, #f6e7bf 0%, #d4af37 55%, #b8891f 100%);
        color: #17120a;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Thank you</h1>
      <p>Your inquiry has been sent. We’ll get back to you soon.</p>
      <a href="/">Back to site</a>
    </div>
  </body>
</html>
